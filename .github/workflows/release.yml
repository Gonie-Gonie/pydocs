name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Build distributions
        run: python -m build

      - name: Render release documents
        run: |
          python examples/usage_guide_example/main.py
          python examples/journal_paper_example/main.py

      - name: Resolve release notes
        id: release_notes
        shell: bash
        run: |
          notes_path="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$notes_path" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "path=$notes_path" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with repo notes
        if: steps.release_notes.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/docscriptor-user-guide.pdf
            artifacts/journal-paper/docscriptor-development-philosophy.pdf
          body_path: ${{ steps.release_notes.outputs.path }}

      - name: Publish GitHub Release
        if: steps.release_notes.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            artifacts/usage-guide/docscriptor-user-guide.pdf
            artifacts/journal-paper/docscriptor-development-philosophy.pdf
          generate_release_notes: true
